audit.kafka.topic=audit-events
audit.idempotency.ttl-days=${AUDIT_IDEMPOTENCY_TTL_DAYS:7}

spring.application.name=audit-event-consumer

spring.kafka.consumer.group-id=oidc-audit-consumer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.threads.virtual.enabled=true

server.port=8082